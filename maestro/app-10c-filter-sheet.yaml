# Madde 10 (bölüm 3) + Madde 12 result yarısı — FilterBottomSheet dismiss & hide-then-result
#  - aşağı swipe            -> kapanır, order DEĞİŞMEZ (Canceled)
#  - scrim'e tık            -> kapanır, order DEĞİŞMEZ (Canceled)
#  - bir sıralama seçeneğine tık -> sheet ÖNCE kapanır (hide) SONRA order güncellenir (Value)
appId: dev.gezgin.sample.app
---
- launchApp:
    clearState: true
- assertVisible: "Giriş yap"
- tapOn: "Giriş"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 1) aşağı swipe ile dismiss -> Canceled, order sabit ---
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
# NOT: sheet AÇIKKEN alttaki panel metnini assert ETMİYORUZ — Compose modal bottom-sheet açık overlay'i
# semantics ağacından çıkarır (cihazda doğrulandı), Maestro kısmi-overlay altını GÖREMEZ. Alttaki panel
# yalnız sheet KAPANDIKTAN sonra (aşağıdaki assert'ler) doğrulanır.
# element-çapalı swipe (hardcoded 50%,70%->50%,98% yerine): kısa sheet'te scrim'e düşüp case(1)'i
# sessizce case(2)'nin kopyası yapmaz — gövdeden aşağı süpürür.
- swipe:
    from:
      text: "Sırala (şu an: RELEVANCE)"
    direction: DOWN
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 2) scrim'e (üst bölge) tık ile dismiss -> Canceled, order sabit ---
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
- tapOn:
    point: "50%,5%"
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 3) seçenek seç -> hide-then-result: sheet kapanır, order PRICE_ASC olur ---
# NOT (Madde 12): assertion'lar yalnız FİNAL state'i görür (sheet kapalı + order güncel). hide->result
#      SIRASI burada assert'le ÖLÇÜLMEZ (result-then-hide de aynı final state'i verirdi) — bkz. rapor.
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
- tapOn: "PRICE_ASC"
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: PRICE_ASC"
