# Madde 10 (bölüm 3) + Madde 12 result yarısı — FilterBottomSheet dismiss & hide-then-result
#  - aşağı swipe            -> kapanır, order DEĞİŞMEZ (Canceled)
#  - scrim'e tık            -> kapanır, order DEĞİŞMEZ (Canceled)
#  - bir sıralama seçeneğine tık -> sheet ÖNCE kapanır (hide) SONRA order güncellenir (Value)
appId: dev.gezgin.sample.app
---
- launchApp:
    clearState: true
- assertVisible: "Giriş yap"
- tapOn: "Giriş"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 1) aşağı swipe ile dismiss -> Canceled, order sabit ---
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
- swipe:
    start: "50%,70%"
    end: "50%,98%"
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 2) scrim'e (üst bölge) tık ile dismiss -> Canceled, order sabit ---
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
- tapOn:
    point: "50%,5%"
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: RELEVANCE"
# --- 3) seçenek seç -> hide-then-result: sheet kapanır, order PRICE_ASC olur ---
- tapOn: "Sırala"
- assertVisible: "Sırala (şu an: RELEVANCE)"
- tapOn: "PRICE_ASC"
- assertNotVisible: "Sırala (şu an: RELEVANCE)"
- assertVisible: "Panel — sıralama: PRICE_ASC"
