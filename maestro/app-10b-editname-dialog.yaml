# Madde 10 (bölüm 2) — EditNameDialog dismiss & result teslimi
# NOT: dismissOnClickOutside = route.current.isNotBlank() — route ARGÜMANINDAN okunur (açılış anında sabit),
#      canlı text-field DEĞİL. Profil adı ("Gezgin Kullanıcı") boş olmadığı için dismissOnClickOutside=TRUE:
#      dışarı tık dialog'u KAPATIR (Canceled). Checklist'in "sil -> kapanmaz" senaryosu sample'da
#      uygulanmıyor (route yeniden açılmadıkça current değişmez) — bkz. rapor.
appId: dev.gezgin.sample.app
---
- launchApp:
    clearState: true
- assertVisible: "Giriş yap"
- tapOn: "Giriş"
- assertVisible: "Panel — sıralama: RELEVANCE"
- tapOn: "Profil"
- assertVisible: "Profil: Gezgin Kullanıcı"
# --- dışarı tık: current non-blank -> dismissOnClickOutside=true -> KAPANIR (Canceled) ---
- tapOn: "Adı düzenle"
- assertVisible: "Kaydet"      # dialog açık (dialog'a özgü buton)
- tapOn:
    point: "50%,4%"
- assertNotVisible: "Kaydet"   # dialog kapandı
- assertVisible: "Profil: Gezgin Kullanıcı"   # ad DEĞİŞMEDİ (Canceled)
# --- Kaydet ile Value teslimi: ismi değiştir, sonuç akmalı ---
- tapOn: "Adı düzenle"
- assertVisible: "Kaydet"
- tapOn:
    text: "^Gezgin Kullanıcı$"   # yalnız text-field (regex anchored) — "Profil: ..." eşleşmez
- eraseText
- inputText: "Yeni Ad"
- tapOn: "Kaydet"
# Value teslimini KALICI state ile kanıtla (non-flaky discriminator): dialog kapanır + ad güncellenir.
- assertNotVisible: "Kaydet"
- assertVisible: "Profil: Yeni Ad"   # result Value teslim edildi + ad güncellendi (asıl kontrat kanıtı)
# NOT: "Ad güncellendi" LENGTH_SHORT toast'u GATE EDİLMİYOR — ~2sn ömürlü, yoğun suite'te flaky (busy
#      device'ta assert penceresini kaçırabilir; full run-all'da bu satır tek flaky-FAIL'di). Efekt-teslim
#      mekanizması run-14'te logcat ile DETERMİNİSTİK sayılıyor (SettingsMvi effect=1); burada Value
#      teslimi zaten kalıcı ad değişimiyle kanıtlanıyor.
