# Madde 18b (seed) — @GoForResult MODAL bottom-sheet (FilterBottomSheet) aç, pending result slot beklerken bırak.
# Login -> Dashboard -> "Sırala" -> FilterBottomSheet (BottomSheetContract, HomeGraph @GoForResult "pickSort").
# Bu rota DashboardViewModel.PickSort — kaynak yorumu suspend sonucun "config-change/PD'de sessizce düşmez"
