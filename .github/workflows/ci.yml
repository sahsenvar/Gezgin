name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: read-all

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper-validation:
    name: wrapper-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

  build:
    name: build-test-api-docs
    needs: wrapper-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Test build logic
        run: ./gradlew -p buildSrc test --no-daemon --console=plain

      - name: Run build, test, API, KDoc and Dokka gates
        run: >-
          ./gradlew
          check apiCheck checkPublicApiKDoc
          :gezgin-core:test :gezgin-core:jvmTest :gezgin-core:dokkaGenerate
          :gezgin-processor:test :gezgin-processor:dokkaGenerate
          :gezgin-mvi:jvmTest :gezgin-mvi:dokkaGenerate
          :gezgin-test:jvmTest :gezgin-test:dokkaGenerate
          :sample:navigation:test :sample:shopr:test :sample:app:test
          :sample:app:assembleDebug :sample:shopr:assembleDebug
          --no-daemon --console=plain

  release-artifacts:
    name: signed-local-publications
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Verify local signing prerequisites
        run: |
          java -version
          test -d "$ANDROID_HOME"
          gpg --version

      # Publishes only to a temporary local repository and uses an ephemeral GPG key.
      - name: Verify signed local release and isolated consumer
        run: ./gradle/verify-release-publications.sh
