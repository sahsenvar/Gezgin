name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# CI publishes only to an ephemeral local repository. No Central upload or repository secret is used.
jobs:
  build:
    runs-on: ubuntu-latest  # Android SDK önyüklü
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release prerequisites
        run: |
          java -version
          test -d "$ANDROID_HOME"
          gpg --version

      - name: Test release build logic
        run: ./gradlew -p buildSrc test --no-daemon --console=plain

      - name: Verify signed local release and isolated consumer
        run: ./gradle/verify-release-publications.sh

      - name: Build, test ve apiCheck
        run: >-
          ./gradlew
          :gezgin-core:test :gezgin-core:jvmTest
          :gezgin-processor:test :gezgin-mvi:jvmTest :gezgin-test:jvmTest
          :sample:navigation:test :sample:shopr:test :sample:app:assembleDebug
          check apiCheck --console=plain
