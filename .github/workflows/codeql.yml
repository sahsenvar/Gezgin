name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

permissions: read-all

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: java-kotlin
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build JVM and Android targets
        run: >-
          ./gradlew
          :gezgin-core:compileKotlinJvm :gezgin-core:compileDebugKotlinAndroid
          :gezgin-mvi:compileKotlinJvm :gezgin-mvi:compileDebugKotlinAndroid
          :gezgin-test:compileKotlinJvm :gezgin-test:compileDebugKotlinAndroid
          :gezgin-processor:compileKotlin
          :sample:navigation:compileKotlin :sample:app:compileDebugKotlin
          --no-daemon --console=plain

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:java-kotlin
