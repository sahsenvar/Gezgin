name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

permissions: read-all

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: java-kotlin
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build JVM and Android targets
        run: >-
          ./gradlew
          :gezgin-core:compileKotlinJvm :gezgin-core:compileDebugKotlinAndroid
          :gezgin-mvi:compileKotlinJvm :gezgin-mvi:compileDebugKotlinAndroid
          :gezgin-test:compileKotlinJvm :gezgin-test:compileDebugKotlinAndroid
          :gezgin-processor:compileKotlin
          :sample:navigation:compileKotlin :sample:app:compileDebugKotlin
          --no-daemon --console=plain

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: /language:java-kotlin
