name: Release

on:
  push:
    tags: [ 'v*' ]

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Validate stable tag, project version and changelog
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradle/release/validate-release.sh "$RELEASE_TAG"

      - name: Test release scripts
        run: ./gradle/release/test-release-scripts.sh

      - name: Test build and release logic
        run: ./gradlew -p buildSrc test --no-daemon --console=plain

      - name: Run release quality gates
        run: >-
          ./gradlew
          check apiCheck checkPublicApiKDoc spotlessCheck koverVerify
          :gezgin-core:test :gezgin-core:jvmTest :gezgin-core:dokkaGenerate
          :gezgin-processor:test :gezgin-processor:dokkaGenerate
          :gezgin-mvi:jvmTest :gezgin-mvi:dokkaGenerate
          :gezgin-test:jvmTest :gezgin-test:dokkaGenerate
          :sample:navigation:test :sample:shopr:test :sample:app:test
          :sample:app:assembleDebug :sample:shopr:assembleDebug
          --no-daemon --console=plain

      - name: Verify signed local publications and isolated consumer
        run: ./gradle/verify-release-publications.sh

  publish:
    name: publish
    needs: validate
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Verify publishing credentials are configured
        run: |
          test -n "$ORG_GRADLE_PROJECT_mavenCentralUsername"
          test -n "$ORG_GRADLE_PROJECT_mavenCentralPassword"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKey"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKeyPassword"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKeyId"

      - name: Publish and release to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache

  central-smoke:
    name: central-smoke
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve all artifacts from Maven Central in a clean Gradle 9.4.1 consumer
        run: ./gradle/release/smoke-maven-central.sh "${GITHUB_REF_NAME#v}"

  github-release:
    name: github-release
    needs: central-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract changelog release notes
        run: ./gradle/release/extract-release-notes.sh "${GITHUB_REF_NAME#v}" release-notes.md

      - name: Create GitHub Release after Central verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file release-notes.md
