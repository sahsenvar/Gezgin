name: Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: read-all

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotless:
    name: spotless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Check formatting
        run: ./gradlew spotlessCheck --no-daemon --console=plain

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Generate and verify Kover reports
        run: >-
          ./gradlew koverXmlReport koverHtmlReport koverVerify
          --no-daemon --console=plain

      - name: Upload Kover HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kover-html
          path: build/reports/kover/html
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV_TOKEN == 'true' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          fail_ci_if_error: false

      - name: Note skipped Codecov upload
        if: ${{ env.HAS_CODECOV_TOKEN != 'true' }}
        run: echo "CODECOV_TOKEN is unavailable; local coverage gates still passed."
